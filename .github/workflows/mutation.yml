# Mutation testing (Stryker) over the whole app, at a literal 100% score.
# A single full-scope run is ~70 min (7k+ mutants) and exceeds the runner's
# per-job ceiling, so it is SHARDED into a matrix of short per-area jobs (each a
# few thousand mutants, well under the limit) that together cover public_html/**.
# Runs nightly and on demand; per-push CI relies on the unit suite + coverage gate.
name: Mutation

on:
    schedule:
        - cron: "37 4 * * *"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: mutation-${{ github.ref }}
    cancel-in-progress: true

jobs:
    stryker:
        name: Stryker (${{ matrix.name }})
        runs-on: ubuntu-latest
        timeout-minutes: 60
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: core
                      scope: "public_html/lib/core/**/*.js"
                    - name: atoms+molecules
                      scope: "public_html/lib/atoms/**/*.js,public_html/lib/molecules/**/*.js"
                    # force-graph is isolated: its rAF/canvas physics loop yields
                    # infinite-loop mutants (e.g. a counting-up `for` flipped to count
                    # down) that peg a core until Stryker's timeout. Bundled with the
                    # rest of organisms on a 2-vCPU runner, several at once starve the
                    # runner agent's heartbeat → "runner lost communication" (an OOM/CPU
                    # infra failure, not a survivor). Its own shard + concurrency 1 keeps
                    # one core free for the agent so these mutants are killed, not lost.
                    - name: organisms-graph
                      scope: "public_html/lib/organisms/force-graph.js"
                      concurrency: "1"
                    - name: organisms-rest
                      scope: "public_html/lib/organisms/**/*.js,!public_html/lib/organisms/force-graph.js"
                    - name: views-a
                      scope: "public_html/views/home.js,public_html/views/search.js,public_html/views/tool.js"
                    - name: views-b
                      scope: "public_html/views/lists.js,public_html/views/toolforms.js"
                    - name: styleguide
                      scope: "public_html/views/styleguide.js"
                    - name: views-rest+main
                      scope: "public_html/views/router.js,public_html/views/static.js,public_html/views/parity.js,public_html/views/graph.js,public_html/views/authors.js,public_html/views/experiments.js,public_html/views/_fixtures.js,public_html/main.js"
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
            - run: npm ci
            - name: Stryker (vitest runner, happy-dom — no browser needed)
              env:
                  SCOPE: ${{ matrix.scope }}
                  # Default 2 keeps a core's worth of headroom on the 2-vCPU runner so
                  # infinite-loop mutants are killed by Stryker's timeout, never by
                  # starving the runner agent. Heavy shards may pin it lower (matrix).
                  CONCURRENCY: ${{ matrix.concurrency || '2' }}
              run: npx stryker run --mutate "$SCOPE" --concurrency "$CONCURRENCY"
