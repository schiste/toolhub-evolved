[tool.ruff]
target-version = "py311"
line-length = 120
src = ["proxy"]

[tool.ruff.lint]
# "ALL" includes flake8-bandit (the S* rules) — that IS our Python security
# scan (shell injection, eval, hardcoded secrets, requests without timeout, …).
# If you ever narrow this select list, keep "S" so security coverage stays on.
select = ["ALL"]
# Only non-security rules may be ignored. Never add an "S*" code here; silence a
# specific finding with an inline `# noqa: S### <reason>` so it stays auditable.
# D203/D211 and D212/D213 are mutually exclusive pairs in ruff's "ALL" set —
# pick one of each (D211, D212) to silence the "incompatible rules" warnings.
ignore = [
  "COM812",
  "D100",
  "D103",
  "D203",
  "D213",
  "ISC001"
]

[tool.ruff.format]
line-ending = "lf"
